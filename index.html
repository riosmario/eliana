<!DOCTYPE html>
<html lang="es">   
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Cielito de Eliana - Tienda</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <button id="btn-volver" onclick="mostrarRubros()" class="btn-volver-estilo" style="display: none;">
                <i class="fas fa-arrow-left"></i>
            </button>

            <h1 id="main-title">EL CIELITO <br> <span>DE ELIANA</span></h1>

            <button onclick="abrirModal()" class="btn-cart-header">
                <i class="fas fa-shopping-cart"></i> (<span id="cart-counter">0</span>)
            </button>
        </div>
        
        <div class="search-container">
            <input type="text" id="buscador" placeholder="¿Qué estás buscando?" onkeyup="buscarProductos()">
        </div>
    </header>
    <span></span>
    <main class="container">
        <section id="productos-grid" class="grid-container"></section>
    </main>

    <div id="modal-carrito" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModal()">&times;</span>
            <h2>📋 Resumen de Pedido</h2>
            <div id="lista-carrito"></div>
            <div class="total-container">
                <strong>Total:</strong> <span id="total-precio">$0</span>
            </div>
            <button id="btn-whatsapp">🚀 Enviar Pedido por WhatsApp</button>
            <button onclick="cerrarModal()">Continuar comprando</button>
        </div>
    </div>

    <div id="modal-imagen" class="modal-img" onclick="cerrarImagen()">
        <span class="close-img">&times;</span>
        <img id="img-agrandada" class="modal-img-contenido">
        <div id="caption-imagen"></div>
    </div>

    <footer class="main-footer">
        <div class="footer-info">
            <h3>🌈 EL CIELITO DE ELIANA</h3>
            <p><i class="fas fa-map-marker-alt"></i> Córdoba, Argentina</p>
            <p><i class="fas fa-phone-alt"></i> 3513018831</p>
            <div class="social-links">
                <i class="fab fa-instagram"></i> <i class="fab fa-facebook"></i>
            </div>
            <p class="copyright">© 2026 - Temporada Escolar</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
